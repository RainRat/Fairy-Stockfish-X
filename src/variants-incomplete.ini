# Hindustani Chess
# Source verified from:
# - https://www.chessvariants.com/historic.dir/HistoricalChessVariants.pdf
# - https://www.chessvariants.com/historic.dir/hindustani.html
# Missing engine support for full completion:
# - the king's once-per-game knight leap, forbidden after the king has been checked
[hindustani:chess]
pieceToCharTable = -
castling = false
doubleStep = false
enPassantRegion = -
stalemateValue = loss
extinctionPieceTypes = qrbnp
customPiece1 = x:B
customPiece2 = y:B
startFen = rnxqkynr/pppppppp/8/8/8/8/PPPPPPPP/RNXQKYNR w - - 0 1
promotionRegionWhite = *8
promotionRegionBlack = *1
mandatoryPromotionRegionWhite = *8
mandatoryPromotionRegionBlack = *1
promotionPieceTypesByFile = a:r b:n c:x d:q e:- f:y g:n h:r
promotionLimit = q:1 r:2 n:2 x:1 y:1

