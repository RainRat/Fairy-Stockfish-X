# Variants tracked as "baseline/incomplete" implementations.
#
# Purpose:
# - Keep WIP/baseline variants in one place.
# - Document what is still needed for a "complete" implementation.
# - Allow loading only these variants by setting:
#     setoption name VariantPath value variants-incomplete.ini
#
# Notes:
# - These entries intentionally mirror currently playable baselines.
# - Completion requirements are documented as TODO comments above each variant.

# TODO for completion:
# - Implement historical setup phase with two drops per turn (instead of one).
# - Enforce any opening-phase movement constraints from the selected rules source.
[seega:chess]
maxRank = 5
maxFile = 5
pieceToCharTable = -
king = -
customPiece1 = d:mW
startFen = 5/5/5/5/5[DDDDDDDDDDDDdddddddddddd] w - - 0 1
pieceDrops = true
mustDrop = true
passUntilSetup = true
dropRegion = a1 b1 c1 d1 e1 a2 b2 c2 d2 e2 a3 b3 d3 e3 a4 b4 c4 d4 e4 a5 b5 c5 d5 e5
surroundCaptureOpposite = true
checking = false
passOnStalemate = true
stalemateValue = draw
extinctionPieceTypes = d
extinctionPieceCount = 1
extinctionValue = loss
nMoveRule = 0

# Hindustani Chess
# Source verified from:
# - https://www.chessvariants.com/historic.dir/HistoricalChessVariants.pdf
# - https://www.chessvariants.com/historic.dir/hindustani.html
# Missing engine support for full completion:
# - the king's once-per-game knight leap, forbidden after the king has been checked
[hindustani:chess]
pieceToCharTable = -
castling = false
doubleStep = false
enPassantRegion = -
stalemateValue = loss
extinctionPieceTypes = qrbnp
customPiece1 = x:B
customPiece2 = y:B
startFen = rnxqkynr/pppppppp/8/8/8/8/PPPPPPPP/RNXQKYNR w - - 0 1
promotionRegionWhite = *8
promotionRegionBlack = *1
mandatoryPromotionRegionWhite = *8
mandatoryPromotionRegionBlack = *1
promotionPieceTypesByFile = a:r b:n c:x d:q e:- f:y g:n h:r
promotionLimit = q:1 r:2 n:2 x:1 y:1

# Camel and Rhino Chess
# Source verified from a rules transcription of the Chess Variant Pages entry.
# Missing engine support for full completion:
# - adjacent friendly-piece switching / swap moves
# - takeover captures that can jump over one or more enemy pieces
# - combined takeover + replacement captures in a single move
# - piece-loss victory condition based on both camel and rhino being gone
[camel-rhino]
maxRank = 10
maxFile = j
customPiece1 = x:JW
customPiece2 = z:N
customPiece3 = c:LF
customPiece4 = w:W
rook = r
knight = n
bishop = b
queen = q
king = k
pawn = p
castling = false
startFen = r8r/1xzbqkbnc1/pppp2pppp/4ww4/10/10/4WW4/PPPP2PPPP/1XZBQKBNC1/R8R w - - 0 1

# Dots and Boxes prototype
# Embedded-board proof of concept:
# - dots are pre-seeded wall squares
# - players place line walls on the remaining edge squares
# - completed boxes auto-claim their center and grant an extra turn
# TODO for completion:
# - decide whether wall-only move encoding should get a dedicated anchor-free form
[dots-boxes-2x2:fairy]
maxRank = 5
maxFile = e
startFen = *1*1*/5/*1*1*/5/*1*1* w - - 0 1
checking = false
king = -
immobile = b
wallingRule = static
wallOrMove = true
wallingRegion = b1 d1 a2 c2 e2 b3 d3 a4 c4 e4 b5 d5
surroundClaimRegion = b2 d2 b4 d4
surroundClaimPiece = b
surroundClaimExtraTurn = true
materialCounting = unweighted
materialCountingPieceTypes = b

[dots-boxes-9x9:dots-boxes-2x2]
maxRank = 9
maxFile = i
startFen = *1*1*1*1*/9/*1*1*1*1*/9/*1*1*1*1*/9/*1*1*1*1*/9/*1*1*1*1* w - - 0 1
wallingRegion = b1 d1 f1 h1 a2 c2 e2 g2 i2 b3 d3 f3 h3 a4 c4 e4 g4 i4 b5 d5 f5 h5 a6 c6 e6 g6 i6 b7 d7 f7 h7 a8 c8 e8 g8 i8 b9 d9 f9 h9
surroundClaimRegion = b2 d2 f2 h2 b4 d4 f4 h4 b6 d6 f6 h6 b8 d8 f8 h8

