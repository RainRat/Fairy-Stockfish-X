# Variants tracked as "baseline/incomplete" implementations.
#
# Purpose:
# - Keep WIP/baseline variants in one place.
# - Document what is still needed for a "complete" implementation.
# - Allow loading only these variants by setting:
#     setoption name VariantPath value variants-incomplete.ini
#
# Notes:
# - These entries intentionally mirror currently playable baselines.
# - Completion requirements are documented as TODO comments above each variant.

# Camel and Rhino Chess
# Source verified from a rules transcription of the Chess Variant Pages entry.
# Missing engine support for full completion:
# - adjacent friendly-piece switching / swap moves
# - takeover captures that can jump over one or more enemy pieces
# - combined takeover + replacement captures in a single move
# - piece-loss victory condition based on both camel and rhino being gone
[camel-rhino]
maxRank = 10
maxFile = j
customPiece1 = x:JW
customPiece2 = z:N
customPiece3 = c:LF
customPiece4 = w:W
rook = r
knight = n
bishop = b
queen = q
king = k
pawn = p
castling = false
startFen = r8r/1xzbqkbnc1/pppp2pppp/4ww4/10/10/4WW4/PPPP2PPPP/1XZBQKBNC1/R8R w - - 0 1

# Dots and Boxes prototype
# Embedded-board proof of concept:
# - dots are pre-seeded wall squares
# - players place line walls on the remaining edge squares
# - completed boxes auto-claim their center and grant an extra turn
# TODO for completion:
# - decide whether wall-only move encoding should get a dedicated anchor-free form
[dots-boxes-2x2:fairy]
maxRank = 5
maxFile = e
startFen = *1*1*/5/*1*1*/5/*1*1* w - - 0 1
king = -
immobile = b
wallingRule = static
wallOrMove = true
wallingRegion = b1 d1 a2 c2 e2 b3 d3 a4 c4 e4 b5 d5
surroundClaimRegion = b2 d2 b4 d4
surroundClaimPiece = b
surroundClaimExtraTurn = true
materialCounting = unweighted
materialCountingPieceTypes = b

