startFen = *1*1*1*1*1*1*1*/15/*1*1*1*1*1*1*1*/15/*1*1*1*1*1*1*1*/15/*1*1*1*1*1*1*1*/15/*1*1*1*1*1*1*1*/15/*1*1*1*1*1*1*1*/15/*1*1*1*1*1*1*1*/15/*1*1*1*1*1*1*1* w - - 0 1
