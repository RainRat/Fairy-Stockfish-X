# Tawlbwrdd (Cyningstan ruleset in Ludii):
# - 11x11 board
# - king escapes to any edge square
# - king is captured like an ordinary piece, but the centre and corners act as hostile helpers
[tawlbwrdd:ardri]
maxRank = 11
maxFile = 11
startFen = 3rrrrr3/5r5/5R5/r4R4r/r4R4r/rrRRRKRRRrr/r4R4r/r4R4r/5R5/5r5/3rrrrr3 b
flagRegionWhite = *1 *11 a* k*
surroundCaptureHostileRegion = a1 a11 k1 k11 f6
nFoldRule = 2

# Kharebga / Kharbga (5x5), Bellin 1964:
# - alternating two-piece placement, no centre placement
# - then orthogonal rook movement with custodial captures
# - if a player cannot move, they pass
[kharebga]
maxRank = 5
maxFile = 5
customPiece1 = r:mR
startFen = 5/5/5/5/5[RRRRRRRRRRRRrrrrrrrrrrrr] w - - 0 1
pieceDrops = true
mustDrop = true
multimoves = 2 2 2 2 2 2 2 2 2 2 2 2 1 1
dropRegionWhite = *1 *2 a3 b3 d3 e3 *4 *5
dropRegionBlack = *1 *2 a3 b3 d3 e3 *4 *5
surroundCaptureOpposite = true
extinctionValue = win
extinctionPieceTypes = r
passOnStalemate = true
doubleStep = false
castling = false

[kharebga-7x7:kharebga]
maxRank = 7
maxFile = 7
startFen = 7/7/7/7/7/7/7[RRRRRRRRRRRRRRRRRRRRRRRRrrrrrrrrrrrrrrrrrrrrrrrr] w - - 0 1

# Maak Yek:
# - orthogonal rook movement
# - ordinary custodial capture
# - also capture by moving between two enemy pieces
# aka Apit-Sodok
# https://ludii.games/details.php?keyword=Apit
# Malaysian regional form of Maak Yek with the same documented setup and capture rules.
[maak-yek]
customPiece1 = r:mR
startFen = rrrrrrrr/8/rrrrrrrr/8/8/RRRRRRRR/8/RRRRRRRR w - - 0 1
surroundCaptureOpposite = true
surroundCaptureIntervene = true
extinctionValue = win
extinctionPieceTypes = r
doubleStep = false
castling = false

# Apit-Sodok
# https://ludii.games/details.php?keyword=Apit
# Malaysian regional form of Maak Yek with the same documented setup and capture rules.
[apit-sodok:maak-yek]

# Apit
# https://ludii.games/details.php?keyword=Apit
# Canonical Ludii title for the same documented Malaysian rules family.
[apit:apit-sodok]

# Troll:
# - players alternately drop immobile stones
# - dropping may flip enclosed enemy stones along orthogonal or diagonal lines
# - white connects top to bottom, black connects left to right
[troll:ataxx]
maxRank = 8
maxFile = 8
startFen = 8/8/8/8/8/8/8/8
immobile = p
enclosingDrop = none
flipEnclosedPieces = reversi
connectRegion1White = *1
connectRegion2White = *8
connectRegion1Black = a*
connectRegion2Black = h*
connectDiagonal = false
dropRegionWhite = b* c* d* e* f* g*
dropRegionBlack = *2 *3 *4 *5 *6 *7
passOnStalemate = false

# Old Hnefatafl style toggle from modern tafl reconstructions:
# same base layout as hnefatafl, but king can be captured against the board edge.
# Keep it self-contained so non-VERY_LARGE builds skip it cleanly without template warnings.
[old-hnefatafl:ardri]
maxRank = 11
maxFile = 11
startFen = 3rrrrr3/5r5/11/r4R4r/r3RRR3r/rr1RRKRR1rr/r3RRR3r/r4R4r/11/5r5/3rrrrr3 b
flagRegionWhite = a1 a11 k1 k11
surroundCaptureHostileRegion = a1 a11 k1 k11 f6
surroundCaptureMaxRegion = f6
nFoldRule = 2
surroundCaptureEdge = true

# 9x9 Tablut split seen in reconstructions:
# king is "strong" when on or adjacent to throne (4 on throne, 3 adjacent via hostile throne).
[tablut-throne-adjacent-strong:tablut]
surroundCaptureMaxRegion = d5 e4 e5 e6 f5

# Modern corner-escape operationalization for 9x9 Tablut.
[tablut-corner-escape:tablut]
flagRegionWhite = a1 a9 i1 i9

[linesofaction]
#can jump over friendly pieces
#moves X squares, where X is the number of pieces on that line
customPiece1 = n:yxQ
#black goes first
startFen = 1nnnnnn1/N6N/N6N/N6N/N6N/N6N/N6N/1nnnnnn1 b - - 0 1
#connect all your pieces in any shape. -1 means all remaining pieces.
connectGroup = -1
#no n-move rules I could find
nMoveRule = 0
nFoldRule = 0

[groups]
# Richard Hutnik (1998), no captures:
# - Step to orthogonally adjacent empty square
# - Hop over one adjacent piece orthogonally to empty square beyond
customPiece1 = g:mWmpW2
startFen = 8/8/3gG3/2gGgG2/2GgGg2/3Gg3/8/8 w - - 0 1
connectGroup = -1
connectDiagonal = false
nMoveRule = 0
nFoldRule = 0

[checkers]
customPiece1 = m:fFfA
customPiece2 = k:FA
startFen = 1m1m1m1m/m1m1m1m1/1m1m1m1m/8/8/M1M1M1M1/1M1M1M1M/M1M1M1M1 w - - 0 1
promotionPawnTypes = m
promotionPieceTypes = k
mustCapture = true
jumpCaptureTypes = mk
forcedJumpContinuation = true
stalemateValue = loss
nMoveRule = 0
nFoldRule = 3

[english-draughts:checkers]
# Ludii English Draughts matches the current checkers ruleset:
# - short kings
# - men move/capture forward only
# - mandatory capture
# - same-piece continuation
# - turn ends on crowning

# https://github.com/yagu0/vchess/blob/master/client/src/translations/rules/Royalrace/en.pug
[royal-race:chess]
maxRank = 9
maxFile = 7
pieceToCharTable = -
startFen = yxqkqxy/ppppppp/rnbabnr/7/7/7/RNBABNR/PPPPPPP/YXQKQXY w - - 0 1
customPiece1 = p:mRcF
customPiece2 = a:mRcF
customPiece3 = x:B
customPiece4 = y:NN
castling = false
checking = false
promotionPawnTypes = pa
promotionPieceTypes = r
flagPiece = k
flagRegionWhite = *9
flagRegionBlack = *1

[capture-anything:chess]
selfCapture = true

# https://www.chessvariants.com/small.dir/duelingarchbishops.html
[dueling-archbishops:chess]
# Baseline: bishops move as archbishops and captured material can be dropped.
archbishop = b
captureType = hand
pieceDrops = true


