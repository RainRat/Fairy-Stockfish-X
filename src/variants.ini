# This is a configuration file to add user-defined variants to Fairy-Stockfish.
# For baseline/WIP variants with explicit completion checklists, see
# `variants-incomplete.ini` in the same directory.

################################################
### Usage:
# Add "load" and the file path to the SF call (e.g., "stockfish.exe load variants.ini")
# or set the UCI option "VariantPath" to the path of this file in order to load it.
# In order to validate the configuration without actually loading the variants
# run "stockfish.exe check variants.ini", which reports potential config errors.

################################################
### Variant configuration:
# The variant name needs to be specified as a section in square brackets,
# followed by its rule configurations as key-value pairs as described below.
# If you encounter problems configuring variants, please report them at:
# https://github.com/ianfab/Fairy-Stockfish/issues

### Inheritance
# If a variant is similar to a previously defined variant,
# inheritance can be used to simplify the definition. To inherit from the
# configuration of an existing variant, specify the parent variant after the child
# variant name separated by a colon, e.g., [gothic:capablanca].
# When inheritance is used, only the differences to the parent variant need to be defined,
# see the examples in this file, e.g., 3check-crazyhouse.
# When no inheritance is used, the default template applies,
# which is basically standard chess but without any predefined pieces.

### Piece types
# Firstly, the piece types for a variant need to be defined.
# For that, specify the letter used for each piece type, e.g.:
# pawn = p
#
# See the list below for all available predefined piece types (and their Betza notation):
# pawn (fmWfceF)
# knight (N)
# bishop (B)
# rook (R)
# queen (Q)
# fers (F)
# alfil (A)
# fersAlfil (FA)
# silver (FfW)
# aiwok (RNF)
# bers (RF)
# archbishop (BN)
# chancellor (RN)
# amazon (QN)
# knibis (mNcB)
# biskni (mBcN)
# kniroo (mNcR)
# rookni (mRcN)
# shogiPawn (fW)
# lance (fR)
# shogiKnight (fN)
# gold (WfF)
# dragonHorse (BW)
# clobber (cW)
# breakthrough (fmWfF)
# immobile ()
# cannon (mRcpR)
# janggiCannon (pR)
# soldier (fsW)
# horse (nN)
# elephant (nA)
# janggiElephant (nZ)
# banner (RcpRnN)
# wazir (W)
# commoner (K)
# centaur (KN)
# king (K)

### Custom pieces
# Custom pieces can be defined by using one of the available slots:
# customPiece1, customPiece2, ..., customPiece25
# E.g., pawns without double steps could be described as:
# customPiece1 = p:mfWcfF
#
# You can define custom king movements in the same way you can define another custom piece.
# E.g., to make the king move like a centaur:
# king = k:KN
# In contrast to other custom pieces the Betza notation for the king is optional though
# and defaults to a standard chess king (betza: K) when skipped, e.g.:
# king = k
#
# The movements of custom pieces can be defined using the Betza notation.
# https://www.gnu.org/software/xboard/Betza.html
# In Fairy-Stockfish only a subset of Betza notation can be used. The supported features are:
# - base atoms:
#   - leapers and kings: W, F, D, N, A, H, L/C, J/Z, G, K
#   - riders: R, B, Q
#   - universal leaper: U (e.g. mU means "move to any empty square")
#   - bent riders: O (griffon), M (manticore)
#     Bent riders may stop on the first-leg pivot square.
#     If that pivot square is occupied, it may be captured but the second leg does not continue.
#   - circular rider: rose (standard rose / circular knight rider)
#   - explicit tuple leapers: (x,y), e.g. m(4,1)
# - movement modalities:
#   - m = quiet-only
#   - c = capture-only
#   - i = initial-only
#   - ^ = stationary-capture piece marker
# - directional modifiers:
#   - vertical: f, b, v, h
#   - horizontal: r, l, s, h
#   - combinations such as fr, fl, br, bl, fs, bs, hr, hl are supported
# - rider / distance modifiers:
#   - repeated atom or numeric suffix gives a rider / limited-distance rider, e.g. NN, R3, B2
#   - bracketed rider ranges: R[3-5] = 3..5 squares, R[3-] = at least 3 squares
#   - R[n] is intentionally invalid; use Rn for max-only ranges
# - slider / hurdle / blocking modifiers:
#   - p = hopper
#   - g = grasshopper
#   - o = contra-hopper (must be adjacent to the hurdle, then slides)
#   - n = lame leaper
#   - j = ski slider (skips the first square, then slides)
#   - z = max-distance modifier
#   - x = dynamic-distance modifier (Lines-of-Action style)
#   - y = ignores friendly blockers
# - notes:
#   - tuple atoms are supported only as explicit leapers, not as riders/hoppers
#   - L/C are camel aliases; J/Z are zebra aliases

### Piece values
# The predefined and precalculated piece values can be overridden
# by specifying the pieceValueMg and pieceValueEg options, e.g.,
# pieceValueMg = p:150 n:800
# pieceValueEg = p:200 n:900
#
# For orientation, the internal predefined piece values can be found in types.h.
# A suitable piece for gauging the piece values is the rook, which internally has:
# pieceValueMg = r:1276
# pieceValueEg = r:1380

### Piece points
# For pointsCounting (games of points). Not used for evaluation. (default: -) e.g.
# piecePoints = p:1 n:3 b:3 q:9 r:5 k:0

### Option types
# [bool]: boolean flag to enable/disable a feature [true, false]
# [Rank]: denotes a rank of the board [1-10]
# [File]: denotes a file of the board [1-12, a-i]
# [int]: any natural number [0, 1, ...]
# [vector<int>]: a whitespace separated sequence of natural numbers (e.g., 1 2 3)
# [PieceType]: a piece type [letters defined for pieces, e.g., p]
# [PieceSet]: multiple piece types [letters defined for pieces, e.g., nbrq]
# [CastlingRights]: set of castling rights [letters for castling rights as in FEN, e.g., KQkq]
# [Bitboard]: list of squares [e.g., d4 e4 d5 e5]. * can be used as wildcard for files (e.g., *1 is the first rank)
# [PieceTypeBitboardGroup]: list of squares for different pieces. * can be used as wildcard for files and ranks (e.g., *1 is the first rank, ** means everywhere, a* means file a). The syntax is [<piece char (in upper case)>(<location[, ...]>); [...]]. Pieces not specified have no square. Use only a - to indicate that there is no square for all pieces. Example: P(e4,*1);Q(a1,a2,b*);K(**);
# [Value]: game result for the side to move [win, loss, draw]
# [MaterialCounting]: material counting rules for adjudication [janggi, unweighted, whitedrawodds, blackdrawodds, none]
# [CountingRule]: makruk, cambodian, or ASEAN counting rules [makruk, cambodian, asean, none]
# [ChasingRule]: xiangqi chasing rules [axf, none]
# [CapturingRule]: capturing rule [out, hand, prison]
# [EnclosingRule]: reversi, ataxx, etc. enclosing rules [reversi, ataxx, quadwrangle, snort, anyside, top, none]
# - in enclosingDrop:
#  - reversi: must enclose opponent's pieces between yours by Queen move
#  - ataxx: must be adjacent to own piece by King move
#  - snort: must *not* be adjacent to opponent's piece by Wazir move
#  - anyside: must be reached by inserting from an edge and sliding to opposite edge
#  - top: must be reached by inserting from top and sliding to bottom (ie. Connect 4)
# - in flipEnclosedPieces:
#  - reversi: flip opponent's pieces enclosed between yours by Queen move
#  - quadwrangle: if a normal move *or* a drop with a friendly piece adjacent by King move, then flip opponent's pieces adjacent by King move
#  - ataxx: flip opponent's pieces adjacent by King move
# [WallingRule]: wall-placing rule [arrow, duck, edge, past, static, none]
# - arrow: copies piece movement (ie. Game of the Amazons)
# - duck: mobile square (ie. Duck chess)
# - edge: edges of board, opening up new edges (ie. Atlantis)
# - past: previous square (ie. Snailtrail)
# - static: unchanging mask (ie. Isolation)
# [PointsRule]: who gets the points for a capture [us, them, owner, non-owner]
 
### Additional options relevant for usage in Winboard/XBoard
# A few options only have the purpose of improving compatibility with Winboard/Xboard.
# These do not need to be specified when using other GUIs, but can be essential for Winboard/Xboard.
#
# variantTemplate: base variant to inherit GUI logic from [values: fairy, shogi, bughouse] (default: fairy)
# pieceToCharTable: mapping of piece characters to images,
#                   see https://www.gnu.org/software/xboard/whats_new/4.9.0/index.html#tag-B1 (default: -)
#                   intentional asymmetry is allowed for display/compatibility-oriented variants (e.g. asymmetric armies)
# pocketSize: number of pockets shown by XBoard/WinBoard for drop variants [int] (default: 0)

### Rule definition options

## Board, setup, and mobility
# maxRank: maximum rank [Rank] (default: 8)
# maxFile: maximum file [File] (default: 8)
# cylindrical: wrap files left/right (A<->H on 8-file boards) [bool] (default: false)
# toroidal: wrap both files and ranks [bool] (default: false)
# chess960: allow chess960 castling [bool] (default: false)
# twoBoards: pocket pieces are added from an external source, usually from a second board (e.g., bughouse) [bool] (default: false)
# startFen: FEN of starting position (default: rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1)
# mobilityRegion: the mobility area can be defined via options specific to color and piece,
#                 .e.g., mobilityRegionWhiteRook, mobilityRegionBlackJanggiElephant, etc. [Bitboard]

## Promotion and demotion
# pawnTypes: define pieces considered as "pawns" for promotion, en passant, and n move rule [PieceSet] (default: p)
#            see promotionPawnTypes, enPassantTypes, and nMoveRuleTypes for more specific overrides.
# promotionRegionWhite: region where promotions are allowed for white [Bitboard] (default: *8)
# promotionRegionBlack: region where promotions are allowed for black [Bitboard] (default: *1)
# mandatoryPromotionRegionWhite: mandatory sub-region of white promotionRegion; moves entering it must promote if possible and are forbidden otherwise [Bitboard] (default: -)
# mandatoryPromotionRegionBlack: mandatory sub-region of black promotionRegion [Bitboard] (default: -)
# mandatoryPromotionRegion: mandatory sub-region for both colors [Bitboard] (default: -)
# pieceSpecificPromotionRegion: whether to enable promotion region per piece type restriction [bool] (default: false)
# whitePiecePromotionRegion: the promotion region of each piece for white which is under promotionRegionWhite restriction [PieceTypeBitboardGroup] (default: -)
# blackPiecePromotionRegion: the promotion region of each piece for black which is under promotionRegionBlack restriction [PieceTypeBitboardGroup] (default: -)
# promotionPawnTypes: promotion pawn types for both colors [PieceSet] (default: p)
# promotionPawnTypesWhite: white promotion pawn types [PieceSet] (default: p)
# promotionPawnTypesBlack: black promotion pawn types [PieceSet] (default: p)
# promotionPieceTypes: pawn promotion options [PieceSet] (default: nbrq)
# promotionPieceTypesWhite: white pawn promotion options [PieceSet] (default: nbrq)
# promotionPieceTypesBlack: black pawn promotion options [PieceSet] (default: nbrq)
# promotionPieceTypesByFile: destination-file-specific pawn promotion options, e.g. a:r b:n c:b d:q e:- f:b g:n h:r [File->PieceSet map] (default: none)
# promotionPieceTypesByFileWhite: white destination-file-specific promotion options [File->PieceSet map] (default: inherit promotionPieceTypesByFile)
# promotionPieceTypesByFileBlack: black destination-file-specific promotion options [File->PieceSet map] (default: inherit promotionPieceTypesByFile)
# sittuyinPromotion: enable Sittuyin-style pawn promotion [bool] (default: false)
# promotionSteal: allow promotion to a piece type only if opponent has that type on board [bool] (default: false)
# promotionRequireInHand: allow promotion to a piece type only if side has it in hand [bool] (default: false)
# promotionConsumeInHand: consume one matching hand piece on promotion (implies require in hand) [bool] (default: false)
# promotionLimit: maximum number of pieces of a type, e.g., q:1 r:2 (default: )
# promotedPieceType: mapping between unpromoted and promoted non-pawn piece types, e.g., p:g s:g (default: )
# moveMorphPieceType: mapping applied after a piece completes a move, e.g., n:b b:n (default: )
# piecePromotionOnCapture: piece promotion only allowed on captures (e.g., micro shogi) [bool] (default: false)
# mandatoryPawnPromotion: pawn promotion is mandatory [bool] (default: true)
# mandatoryPiecePromotion: piece promotion (and demotion if enabled) is mandatory [bool] (default: false)
# pieceDemotion: enable demotion of pieces (e.g., Kyoto shogi) [bool] (default: false)

## Capture rules and capture side-effects
# blastOnCapture: captures explode all adjacent non-pawn pieces (e.g., atomic chess) [bool] (default: false)
# blastOnMove: blast centers around destination of non-capture moves [bool] (default: false)
# blastOnSelfDestruct: same-square `SPECIAL` self-destruct moves trigger blast [bool] (default: false)
# selfDestructTypes: same-square `SPECIAL` moves like a2a2x that trigger blastOnMove without relocating [PieceSet] (default: none)
# blastPromotion: blast promotes pieces instead of destroying them [bool] (default: false)
# blastDiagonals: are diagonals included in blast [bool] (default: true)
# blastOrthogonals: are orthogonals included in blast [bool] (default: true)
# blastCenter: is the center square included in blast [bool] (default: true)
# blastOnSameTypeCapture: if capture target has same piece type, trigger a zero-range blast on the capture square [bool] (default: false)
# blastPassiveTypes: pieces of these types passively blast adjacent enemy pieces after moves (rejected with royal kings) [PieceSet] (default: none)
# blastImmuneTypes: pieces completely immune to explosions (even at ground zero) [PieceSet] (default: none)
# mutuallyImmuneTypes: pieces that can't capture another piece of same types (e.g., kings (commoners) in atomar) [PieceSet] (default: none)
# deathOnCaptureTypes: capturing pieces of these types become neutral dead squares '^' [PieceSet] (default: none)
# selfCapture: allow capturing own pieces except kings [bool] (default: false)
# selfCaptureWhite/Black: allow own-piece capture for one side only [bool] (default: inherit selfCapture)
# pushingStrength: per-piece mover-driven line-push strength, e.g. p:1 r:8 [PieceType->int map] (default: none)
# pushFirstColor: allowed color of the first contacted pushed piece: us, them, either [PushFirstColor] (default: them)
# pushingRemoves: whether a shove off-board ejects the last pushed piece: none, shove [PushRemoval] (default: none)
# pushChainEnemyOnly: only enemy pieces may continue the pushed chain; friendly pieces stop it [bool] (default: false)
# pushCaptureAgainstFriendlyBlocker: a pushed enemy that hits a friendly blocker is captured instead of moving the blocker [bool] (default: false)
# pushNoImmediateReturn: forbid a push that returns the opponent's previously moved piece to its prior square on the very next turn [bool] (default: false)
# edgeInsertTypes: piece types that can be inserted from configured board edges as drop+push actions [PieceSet] (default: none)
# edgeInsertRegionWhite: entry squares for white insertion [Bitboard] (default: none)
# edgeInsertRegionBlack: entry squares for black insertion [Bitboard] (default: none)
# edgeInsertOnly: suppress ordinary drops for edgeInsertTypes and only allow edge-insert moves for those pieces [bool] (default: false)
# edgeInsertFrom: shared alias for enabled insertion directions using `top`, `bottom`, `left`, `right`, `vertical`, `horizontal`, `all`
# edgeInsertFromWhite/edgeInsertFromBlack: color-specific overrides for edgeInsertFrom using the same direction tokens
# symmetricDropTypes: drop two identical pieces at once onto horizontally paired squares; UCI uses piece@sq1,sq2 [PieceSet] (default: none)
# captureMorph: capturing piece morphs into captured piece type [bool] (default: false)
# rexExclusiveMorph: kings do not morph when captureMorph is enabled [bool] (default: false)
# captureForbidden: forbidden capture pairs attacker:targets, e.g. q:k b:pn *:i [str] (default: )
# captureAllowed: remove captureForbidden pairs (applied after captureForbidden), same format [str] (default: )
# petrifyOnCaptureTypes: defined pieces are turned into wall squares when capturing [PieceSet] (default: -)
# petrifyOnCaptureSuppressTransfer: petrifying captures do not also transfer captured material to hand/prison [bool] (default: false)
# petrifyBlastPieces: if petrify and blast combined, should pieces destroyed in the blast be petrified? [bool] (default: false)
# removeConnectN: remove n-in-a-row from board (rejected with royal kings) [int] (default: 0)
# removeConnectNByType: remove n-in-a-row by piece type, not by color [bool] (default: false)
# surroundCaptureOpposite: enemy piece can be captured by having another of your pieces opposite it [bool] (default: false)
# surroundCaptureIntervene: enemy piece can be captured by moving between two enemy pieces [bool] (default: false)
# surroundCaptureEdge: enemy piece can be captured by having your piece opposite an edge [bool] (default: false)
# surroundCaptureMaxRegion: pieces in this region can be surround-captured if and only if they are surrounded on all possible orthogonal squares (ie. 4 in the center, 3 on an edge, 2 on a corner) [Bitboard] (default: -)
# surroundCaptureHostileRegion: squares in this region are treated as enemy pieces by both sides for surround-capture requirements [Bitboard] (default: -)
# Pawn stepping and en passant
# doubleStep: enable pawn double step [bool] (default: true)
# doubleStepRegionWhite: region where double steps are allowed for white by default; per-piece regions override it when pieceSpecificDoubleStepRegion=true [Bitboard] (default: *2)
# doubleStepRegionBlack: region where double steps are allowed for black by default; per-piece regions override it when pieceSpecificDoubleStepRegion=true [Bitboard] (default: *7)
# tripleStepRegionWhite: region where triple steps are allowed for white by default; per-piece regions override it when pieceSpecificTripleStepRegion=true [Bitboard] (default: -)
# tripleStepRegionBlack: region where triple steps are allowed for black by default; per-piece regions override it when pieceSpecificTripleStepRegion=true [Bitboard] (default: -)
# pieceSpecificDoubleStepRegion: whether to enable double step region per piece type restriction. Does not work with enPassants since all kinds of pieces can double step [bool] (default: false)
# pieceSpecificTripleStepRegion: whether to enable triple step region per piece type restriction. Does not work with enPassants since all kinds of pieces can triple step [bool] (default: false)
# whitePieceDoubleStepRegion: explicit double step region override for each white piece type when pieceSpecificDoubleStepRegion=true [PieceTypeBitboardGroup] (default: -)
# blackPieceDoubleStepRegion: explicit double step region override for each black piece type when pieceSpecificDoubleStepRegion=true [PieceTypeBitboardGroup] (default: -)
# whitePieceTripleStepRegion: explicit triple step region override for each white piece type when pieceSpecificTripleStepRegion=true [PieceTypeBitboardGroup] (default: -)
# blackPieceTripleStepRegion: explicit triple step region override for each black piece type when pieceSpecificTripleStepRegion=true [PieceTypeBitboardGroup] (default: -)
# enPassantRegion: define region (target squares) where en passant is allowed after double steps [Bitboard] (default: AllSquares)
# enPassantRegionWhite: define region (target squares) where en passant is allowed for white [Bitboard] (default: AllSquares)
# enPassantRegionBlack: define region (target squares) where en passant is allowed for black [Bitboard] (default: AllSquares)
# enPassantTypes: define pieces able to capture en passant [PieceSet] (default: p)
# enPassantTypesWhite: define white pieces able to capture en passant [PieceSet] (default: p)
# enPassantTypesBlack: define black pieces able to capture en passant [PieceSet] (default: p)
# enPassantPassedSquares: for custom non-pawn long initial moves, mark all traversed squares or only the first/last one for en passant [EnPassantPassedSquares: all|first|last] (default: all)

## Castling, checks, and royal constraints
# castling: enable castling [bool] (default: true)
# castlingDroppedPiece: enable castling with dropped rooks/kings [bool] (default: false)
# castlingPromotedPiece: enable castling with rooks/kings that arrive by promotion on the castling rank [bool] (default: false)
# castlingForbiddenPlies: disable castling while gamePly is below this threshold [int] (default: 0)
# castlingKingsideFile: destination file of king after kingside castling [File] (default: g)
# castlingQueensideFile: destination file of king after queenside castling [File] (default: c)
# castlingRank: relative rank of castling [Rank] (default: 1)
# castlingKingFile: starting file of the castlingKingPiece if there can be more than one of that type [File] (default: e)
# castlingKingPiece: first piece type that participates in castling [PieceType] (default: k)
# castlingRookKingsideFile: starting file of castlingRookPieces on kingside (if not in corner) [File] (default: l)
# castlingRookQueensideFile: starting file of castlingRookPieces on queenside (if not in corner) [File] (default: a)
# castlingRookPieces: second piece type that participates in castling [PieceSet] (default: r)
# oppositeCastling: can't castle same side as opponent [bool] (default: false)
# checking: permit moves that give check; false is Racing-Kings-style "you may not give check", not "kings are non-royal" [bool] (default: true)
# allowChecks: do not enforce royal check legality; kings may remain in check or be captured, while other check-related rules may still use checking [bool] (default: false)
# royalPieceNoThroughCheck: royal piece may not move through attacked intermediate squares on a multi-square move [bool] (default: false)
# dropChecks: allow checks by piece drops [bool] (default: true)
# dropChecksWhite: allow checks by white piece drops [bool] (default: uses dropChecks)
# dropChecksBlack: allow checks by black piece drops [bool] (default: uses dropChecks)
# dropMates: allow checkmates by piece drops (drop checks can still be allowed) [bool] (default: true)
# dropMatesWhite: allow checkmates by white piece drops [bool] (default: uses dropMates)
# dropMatesBlack: allow checkmates by black piece drops [bool] (default: uses dropMates)
# mustCapture: captures are mandatory (check evasion still takes precedence) [bool] (default: false)
# mustCaptureEnPassant: if any legal en passant capture exists, only en passant captures are legal [bool] (default: false)
# mustCaptureWhite: captures mandatory for white side only [bool] (default: false)
# mustCaptureBlack: captures mandatory for black side only [bool] (default: false)
# rifleCapture: convenience alias enabling stationary capture for all capturing pieces; explicit ^ piece definitions are preferred [bool] (default: false)

## Drops, reserves, and setup phases
# mustDrop: drops are mandatory (e.g., for Sittuyin setup phase) [bool] (default: false)
# mustDropWhite: drops mandatory for white side only [bool] (default: false)
# mustDropBlack: drops mandatory for black side only [bool] (default: false)
# mustDropType: piece type for which piece drops are mandatory [PieceType] (default: *)
# mustDropTypeWhite: white side specific mandatory drop piece type [PieceType] (default: *)
# mustDropTypeBlack: black side specific mandatory drop piece type [PieceType] (default: *)
# openingSwapDrop: allow a narrow swap-opening surrogate by letting the second player
#                  overwrite the lone opening enemy stone in simple move-out drop variants [bool] (default: false)
# dropKingLast: kings may only be dropped after all other hand pieces are gone [bool] (default: false)
# priorityDropTypes: piece types that must be dropped before dropping the other pieces [PieceType] (default: none)
# pieceDrops: enable piece drops [bool] (default: false)
# virtualDrops: allow virtual reserve drops in two-board search heuristics [bool] (default: true)
# virtualDropLimit: per-piece cap for virtual drops, e.g., p:2 n:1 b:1 r:1 q:1 (default: disabled -> legacy heuristic)
# dropLoop: captures promoted pieces are not demoted [bool] (default: false)
# captureType: captured pieces are removed or go to hand or prison [CapturingRule] (default: out)
# captureToHandSide: which side receives pieces transferred by captureType = hand [TransferSide] (default: us)
# captureToHandTypes: captured piece types that actually transfer to hand or prison when captureType is not out [PieceSet] (default: all)
# jumpCaptureTypes: pieces that capture by jumping over one adjacent piece to an empty landing square (supports friendly pieces if selfCapture is enabled) [PieceSet] (default: none)
# forcedJumpContinuation: after a jump capture, force continuation jumps by the same piece if available (opponent must pass) [bool] (default: false)
# forcedJumpSameDirection: when forcedJumpContinuation is enabled, continuation jumps must keep the same step/direction as the previous jump [bool] (default: false)
# openingSelfRemoval: the first two plies of the game are self-removal moves instead of normal moves [bool] (default: false)
# openingSelfRemovalAdjacentToLast: on the second self-removal ply, the removed piece must be orthogonally adjacent to the first removed square [bool] (default: false)
# openingSelfRemovalRegionWhite: squares from which white may remove one of its own pieces during the opening self-removal phase [Bitboard] (default: all squares)
# openingSelfRemovalRegionBlack: squares from which black may remove one of its own pieces during the opening self-removal phase [Bitboard] (default: all squares)
# openingSelfRemovalRegion: same as above for both colors [Bitboard] (default: all squares)
# firstRankPawnDrops: allow pawn drops to first rank [bool] (default: false)
# promotionZonePawnDrops: allow pawn drops in promotion zone [bool] (default: false)
# enclosingDrop: require piece drop to enclose pieces [EnclosingRule] (default: none)
# enclosingDropStart: drop region for starting phase disregarding enclosingDrop (e.g., for reversi) [Bitboard]
# dropRegion: restrict region for piece drops of both colors [Bitboard]
# dropRegionWhite: restrict region for piece drops of all white pieces [Bitboard]
# dropRegionBlack: restrict region for piece drops of all black pieces [Bitboard]
# pieceSpecificDropRegion: whether to enable drop region per piece type restriction [bool] (default: false)
# whitePieceDropRegion: the drop region of each piece for white which is under dropRegionWhite restriction [PieceTypeBitboardGroup] (default: -)
# blackPieceDropRegion: the drop region of each piece for black which is under dropRegionBlack restriction [PieceTypeBitboardGroup] (default: -)
# sittuyinRookDrop: restrict region of rook drops to first rank [bool] (default: false)
# dropOppositeColoredBishop: dropped bishops have to be on opposite-colored squares [bool] (default: false)
# dropPromoted: pieces may be dropped in promoted state [bool] (default: false)
# dropPieceTypes: allow a hand piece to be dropped as any configured board form, e.g. `a:abcd; b:ef;` [PieceTypePieceSetMap] (default: none)
# captureDrops: pieces that may capture by dropping directly onto an occupied square [PieceSet] (default: none)
# dropNoDoubled: specified piece type can not be dropped to the same file (e.g. shogi pawn) [PieceType] (default: -)
# dropNoDoubledWhite/dropNoDoubledBlack: color-specific overrides for dropNoDoubled [PieceType]
# dropNoDoubledCount: specifies the count of already existing pieces for dropNoDoubled [int] (default: 1)
# dropNoDoubledCountWhite/dropNoDoubledCountBlack: color-specific overrides for dropNoDoubledCount [int]
# freeDrops: drops can be any number of any legal piece (the FEN does not need a pocket) [bool] (default: false)
# payPointsToDrop: piece drops spend points based on piecePoints and require sufficient points [bool] (default: false)
# pointsCounting: certain actions (usually captures using piecePoints) can give a player points [bool] (default: false)
# pointsRuleCaptures: who gets the points for a capture in a points-counting game [PointsRule] (default: us)
# pointsGoalValue: how game will be adjudicated for the player that reaches points goal [Value] (default: win)
# pointsGoalSimulValueByMostPoints: if both players reached the points goal, which wins from the perspective of the player with the most points [Value] (default: win)
# pointsGoalSimulValueByMover: if both players reached the points goal, which wins from the perspective of the player who just moved [Value] (default: none)
# pointsGoalSimulValue: alias for pointsGoalSimulValueByMostPoints [Value]
# pointsGoal: what is the goal, in a points-counting game [int] (default: 0)
# hostageExchange: mapping between hostage piece type and exchange types for it, e.g., p:pnbrq n:bnrq q:q (default: )
# prisonPawnPromotion: pawn promote only into piece from prison by exchanging [bool] (default: false)
# immobilityIllegal: pieces may not move to squares where they can never move from [bool] (default: false)

## Gating, potions, walls, and pass-style mechanics
# gating: maintain squares on backrank with extra rights in castling field of FEN [bool] (default: false)
# potions: enable potion drops and cooldown handling [bool] (default: false)
# freezePotion: piece type used for freeze potion drops [PieceType] (default: -)
# jumpPotion: piece type used for jump potion drops [PieceType] (default: -)
# freezeCooldown: minimum full moves between casting the freeze potion [int] (default: 0)
# jumpCooldown: minimum full moves between casting the jump potion [int] (default: 0)
# potionDropOnOccupied: allow potion drops on occupied squares [bool] (default: false)
# wallingRule: rule on where wall can be placed [WallingRule] (default: none)
# wallingWhite: whether white uses the walling rule [bool] (default: true)
# wallingBlack: whether black uses the walling rule [bool] (default: true)
# wallingRegionWhite: mask where wall squares (including duck) can be placed by white [Bitboard] (default: all squares)
# wallingRegionBlack: mask where wall squares (including duck) can be placed by black [Bitboard] (default: all squares)
# wallOrMove: can wall or move, but not both [bool] (default: false)
# surroundClaimRegion: empty center squares that become owned when all four orthogonal neighbors are occupied [Bitboard] (default: none)
# surroundClaimPiece: piece type placed on a completed surroundClaimRegion square [PieceType] (default: -)
# surroundClaimExtraTurn: give the claimer another turn after at least one surroundClaimRegion square is claimed; currently modeled as a forced opponent pass for GUI compatibility [bool] (default: false)
# gatingFromHand: gating consumes a piece from hand; set false for generated post-move gates [bool] (default: true)
# gatingPieceAfter/gatingPieceAfterWhite/gatingPieceAfterBlack: mandatory generated gate piece after a move by the given piece type, e.g. "p:n n:b" [piece->piece map]
# seirawanGating: allow gating of pieces in hand like in S-Chess, requires "gating = true" [bool] (default: false)
# commitGates: gating pieces are committed to gating squares like in Musketeer chess [bool] (default: false)
# cambodianMoves: enable special moves of cambodian chess, requires "gating = true" [bool] (default: false)
# diagonalLines: enable special moves along diagonal for specific squares (Janggi) [Bitboard]
# pass: allow passing [bool] (default: false)
# passWhite: allow passing for white [bool] (default: false)
# passBlack: allow passing for black [bool] (default: false)
# passOnStalemate: allow passing in case of stalemate [bool] (default: false)
# passOnStalemateWhite: allow passing in case of stalemate for white [bool] (default: false)
# passOnStalemateBlack: allow passing in case of stalemate for black [bool] (default: false)
# passUntilSetup: if mustDrop and one side has emptied its pocket while the opponent has not, that side must pass [bool] (default: false)

## Multi-move and rule-specific movement constraints
# multimoves: Sequence of multimoves at the start of the game. The last two numbers
#             define the move alternation for the rest of the game. [vector<int>] (default: )
# progressiveMultimove: move counts by turn are 1,2,3,... with mandatory pass plies in-between [bool] (default: false)
# multimoveCheck: allow checking on non-final moves of a multimove [bool] (default: false)
# multimoveCapture: allow capturing on non-final moves of a multimove [bool] (default: true)
# makpongRule: the king may not move away from check [bool] (default: false)
# flyingGeneral: disallow general face-off like in xiangqi [bool] (default: false)
# diagonalGeneral: disallow king face-off along diagonals [bool] (default: false)
# soldierPromotionRank: restrict soldier to shogi pawn movements until reaching n-th rank [Rank] (default: 1)
# flipEnclosedPieces: change color of pieces that are enclosed by a drop [EnclosingRule] (default: none)

## Repetition, counting, and terminal rules
# nMoveRuleTypes: define pieces resetting n move rule on irreversible moves [PieceSet] (default: p)
# nMoveRuleTypesWhite: define white pieces resetting n move rule on irreversible moves [PieceSet] (default: p)
# nMoveRuleTypesBlack: define black pieces resetting n move rule on irreversible moves [PieceSet] (default: p)
# nMoveRule: move count for 50/n-move rule [int] (default: 50)
# nMoveRuleImmediate: immediate n-move adjudication threshold without claim [int] (default: 0 (disabled))
# nMoveHardLimitRule: game is ended after this many full moves [int] (default: 0 (disabled))
# nMoveHardLimitRuleValue: how the game is adjudicated if it goes over the move limit (can also use materialCounting setting) [Value] (default: draw)
# nFoldRule: move count for 3/n-fold repetition rule [int] (default: 3)
# nFoldRuleImmediate: immediate n-fold adjudication threshold without claim [int] (default: 0 (disabled))
# nFoldValue: result in case of 3/n-fold repetition [Value] (default: draw)
# nFoldValueAbsolute: result in case of 3/n-fold repetition is from white's point of view [bool] (default: false)
# perpetualCheckIllegal: prohibit perpetual checks [bool] (default: false)
# moveRepetitionIllegal: prohibit moving back and forth with the same piece nFoldRule-1 times [bool] (default: false)
# samePlayerBoardRepetitionIllegal: prohibit moves that recreate a board layout reached at the end of the same side's earlier turn [bool] (default: false)
# alternating2x2DropIllegal: prohibit drop placements that create an alternating 2x2 checker pattern [bool] (default: false)
# pathwayDropRule: legal drops must create either no orthogonal adjacencies, or exactly one friendly orthogonal adjacency and any number of enemy ones [bool] (default: false)
# chasingRule: enable chasing rules [ChasingRule] (default: none)
# stalemateValue: result in case of stalemate [Value] (default: draw)
# stalematePieceCount: count material in case of stalemate [bool] (default: false)
# checkmateValue: result in case of checkmate [Value] (default: loss)
# shogiPawnDropMateIllegal: prohibit checkmate via shogi pawn drops [bool] (default: false)
# shogiPawnDropMateIllegalWhite: prohibit checkmate via white shogi pawn drops [bool] (default: uses shogiPawnDropMateIllegal)
# shogiPawnDropMateIllegalBlack: prohibit checkmate via black shogi pawn drops [bool] (default: uses shogiPawnDropMateIllegal)
# shatarMateRule: enable shatar mating rules [bool] (default: false)
# bikjangRule: consider Janggi bikjang (facing kings) rule [bool] (default: false)
# extinctionValue: result when one of extinctionPieceTypes is extinct [Value] (default: none)
# extinctionClaim: extinction of opponent pieces can only be claimed as side to move [bool] (default: false)
# extinctionPseudoRoyal: treat the last extinction piece like a royal piece [bool] (default: false)
# pseudoRoyalTypes: piece types that behave like royal pieces and may not be attacked [PieceSet] (default: )
# pseudoRoyalCount: pieces of pseudoRoyalTypes are royal when count <= this value [int] (default: 1)
# pseudoRoyalValue: result when a side has no current pseudo-royal pieces left [Value] (default: none)
# pseudoRoyalCaptureIllegal: pseudo-royal pieces may not be removed by captures or capture effects [bool] (default: false)
# antiRoyalTypes: piece types that must be attacked (inverse check rule) [PieceSet] (default: )
# antiRoyalCount: pieces of antiRoyalTypes are anti-royal when count <= this value [int] (default: 1)
# antiRoyalSelfCaptureOnly: anti-royal pieces may capture friendly non-king pieces but not enemy pieces [bool] (default: false)
# antiRoyalKingMutuallyImmune: kings and anti-royal pieces do not attack each other [bool] (default: false)
# dupleCheck: when all pseudo-royal pieces are attacked, it counts as a check [bool] (default: false)

## Flag, check-counting, connect, and material-counting wins
# extinctionPieceTypes: list of piece types for extinction rules, e.g., pnbrq (* means all) (default: )
# extinctionMustAppear: listed extinctionPieceTypes do not count as extinct until each side has seen at least one of them on board [PieceSet] (default: )
# extinctionPieceTypesWhite/extinctionPieceTypesBlack: color-specific overrides for extinctionPieceTypes [PieceSet]
# extinctionAllPieceTypes: require all listed extinctionPieceTypes to be extinct, not just any one of them [bool] (default: false)
# extinctionAllPieceTypesWhite/extinctionAllPieceTypesBlack: color-specific overrides for extinctionAllPieceTypes [bool]
# extinctionPieceCount: piece count at which the game is decided by extinction rule (default: 0)
# extinctionPieceCountWhite/extinctionPieceCountBlack: color-specific overrides for extinctionPieceCount [int]
# extinctionOpponentPieceCount: opponent piece count required to adjudicate by extinction rule (default: 0)
# extinctionOpponentPieceCountWhite/extinctionOpponentPieceCountBlack: color-specific overrides for extinctionOpponentPieceCount [int]
# flagPiece: piece type for capture the flag win rule [PieceType] (default: *)
# flagPieceWhite: piece type for capture the flag win rule [PieceType] (default: *)
# flagPieceBlack: piece type for capture the flag win rule [PieceType] (default: *)
# flagRegion: target region for capture the flag win rule [Bitboard] (default: )
# flagRegionWhite: white's target region for capture the flag win rule [Bitboard] (default: )
# flagRegionBlack: black's target region for capture the flag win rule [Bitboard] (default: )
# flagPieceCount: number of flag pieces that have to be in the flag zone [int] (default: 1)
# flagPieceBlockedWin: for flagPieceCount > 1, win if at least one flag piece in flag zone and all others occupied by pieces [bool] (default: false)
# flagMove: the other side gets one more move after one reaches the flag zone [bool] (default: false)
# flagPieceSafe: the flag piece must be safe to win [bool] (default: false)
# checkCounting: enable check count win rule (check count is communicated via FEN, see 3check) [bool] (default: false)
# connectN: number of aligned pieces for win [int] (default: 0)
# connectPieceTypes: pieces evaluated for connection rule [PieceSet] (default: *)
# connectGoalByType: connect wins are checked against per-side piece-type strings (default: false)
# connectPieceGoalWhite: ordered piece symbols that White must connect (e.g., TOOT)
# connectPieceGoalBlack: ordered piece symbols that Black must connect (e.g., OTTO)
# connectVertical: connectN looks at Vertical rows [bool] (default: true)
# connectHorizontal: connectN looks at Horizontal rows [bool] (default: true)
# connectDiagonal: connectN looks at Diagonal rows [bool] (default: true)
# connect3D: interpret either a 3x9 board as flattened 3x3x3 or an 8x8 board as flattened 4x4x4 [bool] (default: false)
# connect4D: interpret a connectN^2 x connectN^2 board as flattened connectN^4 tic-tac-toe for connectN >= 3 [bool] (default: false)
# connectRegion1White: connect Region 1 to Region 2 for win. obeys connectVertical, connectHorizontal, connectDiagonal [Bitboard] (default: -)
# connectRegion2White: "
# connectRegion1Black: "
# connectRegion2Black: "
# connectNxN: connect a tight NxN square for win [int] (default: 0)
# collinearN: arrange N pieces collinearly (other squares can be between pieces) [int] (default: 0)
# connectGroup: arrange N pieces in any shape (-1 means all remaining pieces connected) [int] (default: 0)
# connectValue: result in case of connect [Value] (default: win)
# materialCounting: enable material counting rules [MaterialCounting] (default: none; values include janggi, unweighted, whitedrawodds, blackdrawodds, connectn)
# materialCountingPieceTypes: optional subset of piece types counted by materialCounting (default: all pieces counted by the selected rule)
# adjudicateFullBoard: apply material counting immediately when board is full [bool] (default: false)
# countingRule: enable counting rules [CountingRule] (default: none)
# castlingWins: Specified castling moves are win conditions. Losing these rights is losing. [CastlingRights] (default: -)

