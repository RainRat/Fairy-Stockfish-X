[pond]
maxRank = 4
maxFile = 4
immobile = e
wazir = -
customPiece1 = f:mWmD
customPiece2 = t:mW
promotedPieceType = e:t t:f f:e
startFen = 4/4/4/4[EEEEEEEEEEEEEeeeeeeeeeeeee] w - - 0 1 {0 0}
stalemateValue = loss
pieceDrops = true
pointsCounting = true
pointsRuleCaptures = owner
piecePoints = e:1 t:1 f:1
pointsGoal = 10
pointsGoalValue = win
pointsGoalSimulValue = win
blastOnMove = true
blastPromotion = true
blastDiagonals = false
blastCenter = false
